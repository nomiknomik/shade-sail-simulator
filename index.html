<style>
  :root{ --bg:#11161c; --panel:#1b232c; --panel-2:#232e39; --line:#33414f; --text:#e6edf3; --muted:#92a2b3; --sun:#f4a93c; --ref:#22c3d6; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text)}
  #app{display:flex;height:100vh;overflow:hidden}
  #panel{width:344px;min-width:344px;height:100%;overflow-y:auto;background:var(--panel);border-right:1px solid var(--line);padding-bottom:50px}
  #panel header{padding:16px 18px 12px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel);z-index:3}
  #panel header h1{margin:0;font-size:16px}
  #panel header .ver{font-size:11px;color:var(--muted);margin-top:2px}
  #panel header .langbar{display:flex;gap:4px;margin-top:8px}
  #panel header .langbar button{background:var(--panel-2);border:1px solid var(--line);color:var(--muted);border-radius:5px;padding:3px 9px;font-size:12px;cursor:pointer;font-weight:600}
  #panel header .langbar button.active{background:var(--sun);color:#1a1206;border-color:var(--sun)}
  .group{border-bottom:1px solid var(--line);padding:14px 18px}
  .group h2{margin:0 0 4px;font-size:12px;text-transform:uppercase;letter-spacing:.8px;color:var(--sun);font-weight:600}
  .group .hint{font-size:11px;color:var(--muted);margin:0 0 8px;line-height:1.5}
  .row{display:flex;align-items:center;gap:6px;margin:6px 0}
  .row label{flex:0 0 96px;font-size:13px;color:var(--muted)}
  .row input[type=range]{flex:1;accent-color:var(--sun);height:3px;min-width:40px}
  .num{width:58px;background:var(--panel-2);border:1px solid var(--line);color:var(--text);border-radius:6px;padding:4px 5px;font-size:12px}
  .unit{width:14px;font-size:11px;color:var(--muted)}
  .val{width:60px;text-align:right;font-size:12px;font-variant-numeric:tabular-nums}
  .row input[type=date]{flex:1;background:var(--panel-2);border:1px solid var(--line);color:var(--text);border-radius:6px;padding:4px 6px;font-size:12px}
  .row select{flex:1;background:var(--panel-2);border:1px solid var(--line);color:var(--text);border-radius:6px;padding:5px 6px;font-size:12px}
  .row input[type=color]{width:36px;height:26px;padding:0;border:1px solid var(--line);border-radius:6px;background:var(--panel-2)}
  .row input[type=time]{background:var(--panel-2);border:1px solid var(--line);color:var(--text);border-radius:6px;padding:4px 6px;font-size:12px}
  .card{background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin:8px 0}
  .card h3{margin:0 0 6px;font-size:11px;color:var(--text);font-weight:600;display:flex;justify-content:space-between;align-items:center}
  .btn{background:var(--sun);color:#1a1206;border:none;border-radius:7px;padding:8px 12px;font-size:13px;font-weight:600;cursor:pointer}
  .btn.secondary{background:var(--panel-2);color:var(--text);border:1px solid var(--line)}
  .btn:active{transform:translateY(1px)}
  .minib{background:var(--panel);border:1px solid var(--line);color:var(--text);border-radius:6px;padding:4px 10px;font-size:13px;cursor:pointer;margin-right:4px}
  .minib:active{transform:translateY(1px)}
  .seg{display:flex;gap:4px;margin:4px 0 8px}
  .seg button{flex:1;background:var(--panel-2);border:1px solid var(--line);color:var(--muted);border-radius:6px;padding:5px;font-size:11px;cursor:pointer}
  .seg button.active{background:var(--sun);color:#1a1206;border-color:var(--sun);font-weight:600}
  .readout{font-size:12px;color:var(--muted);line-height:1.7}
  .readout b{color:var(--text);font-variant-numeric:tabular-nums}
  .legend{font-size:11px;color:var(--muted);line-height:1.7}
  .dot{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:6px;vertical-align:middle}
  #stage{flex:1;position:relative}
  #stage canvas{display:block}
  #hud{position:absolute;left:14px;bottom:14px;background:rgba(17,22,28,.8);border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:12px;backdrop-filter:blur(4px)}
  #hud .night{color:var(--sun)}
  #dayHud{position:absolute;left:14px;top:14px;background:rgba(17,22,28,.8);border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:11px;backdrop-filter:blur(4px);pointer-events:none;max-width:280px;line-height:1.6}
  #dayHud b{color:var(--text);font-variant-numeric:tabular-nums}
  #dayHud .dh-label{color:var(--sun);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
  @keyframes card-flash{ 0%{box-shadow:0 0 0 2px var(--sun)} 100%{box-shadow:none} }
  .card.highlight{ animation:card-flash .9s ease-out forwards }
  .group.highlight{ animation:card-flash .9s ease-out forwards }

<body>
<div id="app">
  <aside id="panel">
    <header>
      <h1 id="h-title">Shade Sail Simulator</h1>
      <div class="ver">Version 4.0 · DE/EN/RU · Nordpfeil-Fix · Sonnenpfeil · Wand-Klick</div>
      <div class="langbar">
        <button id="lang-de" class="active" onclick="setLang('de')">DE</button>
        <button id="lang-en" onclick="setLang('en')">EN</button>
        <button id="lang-ru" onclick="setLang('ru')">RU</button>
      </div>
    </header>

    <div class="group">
      <h2 data-i18n="sec-data"></h2>
      <div class="row" style="gap:6px">
        <button class="btn secondary" id="btnExport" style="flex:1" data-i18n="btn-export"></button>
        <button class="btn secondary" id="btnImport" style="flex:1" data-i18n="btn-import"></button>
        <button class="btn secondary" id="btnReset" style="flex:0 0 64px" data-i18n="btn-reset"></button>
      </div>
      <p class="hint" id="saveState" data-i18n="hint-save"></p>
      <input id="fileImport" type="file" accept="application/json" hidden>
    </div>

    <div class="group" id="group-garden">
      <h2 data-i18n="sec-garden"></h2>
      <div class="row"><label data-i18n="lbl-width"></label><input id="gw" type="range" min="3" max="30" step="0.5"><input id="gwn" class="num" type="text" inputmode="decimal"><span class="unit">m</span></div>
      <div class="row"><label data-i18n="lbl-depth"></label><input id="gd" type="range" min="3" max="30" step="0.5"><input id="gdn" class="num" type="text" inputmode="decimal"><span class="unit">m</span></div>
      <div class="row"><label data-i18n="lbl-wall-x0"></label><input id="wx0" type="range" min="0" max="4" step="0.1"><input id="wx0n" class="num" type="text" inputmode="decimal"><span class="unit">m</span></div>
      <div class="row"><label data-i18n="lbl-wall-xb"></label><input id="wxb" type="range" min="0" max="4" step="0.1"><input id="wxbn" class="num" type="text" inputmode="decimal"><span class="unit">m</span></div>
      <div class="row"><label data-i18n="lbl-wall-y0"></label><input id="wy0" type="range" min="0" max="4" step="0.1"><input id="wy0n" class="num" type="text" inputmode="decimal"><span class="unit">m</span></div>
      <div class="row"><label data-i18n="lbl-wall-yt"></label><input id="wyt" type="range" min="0" max="4" step="0.1"><input id="wytn" class="num" type="text" inputmode="decimal"><span class="unit">m</span></div>
      <div class="row"><label data-i18n="lbl-north"></label><input id="north" type="range" min="0" max="360" step="1"><input id="northn" class="num" type="text" inputmode="decimal"><span class="unit">°</span></div>
      <p class="hint" data-i18n="hint-walls"></p>
    </div>

    <div class="group">
      <h2 data-i18n="sec-location"></h2>
      <div class="row"><label data-i18n="lbl-city"></label>
        <select id="city">
          <option value="manual" data-i18n="city-manual"></option>
          <option value="47.5536,7.9447">Bad Säckingen</option>
          <option value="48.4636,8.4111">Freudenstadt</option>
          <option value="49.0069,8.4037">Karlsruhe</option>
          <option value="48.1351,11.5820">München</option>
          <option value="48.7606,8.2398">Baden-Baden</option>
        </select>
      </div>
      <div class="row"><label data-i18n="lbl-lat"></label><input id="lat" type="text" inputmode="decimal" class="num" style="width:auto;flex:1"></div>
      <div class="row"><label data-i18n="lbl-lon"></label><input id="lon" type="text" inputmode="decimal" class="num" style="width:auto;flex:1"></div>
      <div class="row"><label data-i18n="lbl-date"></label><input id="date" type="date"></div>
      <div class="row"><label data-i18n="lbl-time"></label><input id="time" type="range" min="0" max="1439" step="5"><input id="timeInput" type="time"></div>
      <div class="row" style="gap:8px">
        <button class="btn" id="play" style="flex:1" data-i18n="btn-play"></button>
        <button class="btn secondary" id="now" style="flex:0 0 64px" data-i18n="btn-now"></button>
      </div>
    </div>

    <div class="group">
      <h2 data-i18n="sec-posts"></h2>
      <p class="hint" data-i18n="hint-posts"></p>
      <div class="row"><label data-i18n="lbl-labels"></label><input id="showLabels" type="checkbox" style="accent-color:var(--sun)"><span class="unit" style="width:auto;color:var(--muted)" data-i18n="hint-labels-3d"></span></div>
      <div id="points"></div>
    </div>

    <div class="group">
      <h2 data-i18n="sec-sails"></h2>
      <p class="hint" data-i18n="hint-sails"></p>
      <div id="sails"></div>
    </div>

    <div class="group">
      <h2 data-i18n="sec-furniture"></h2>
      <p class="hint" data-i18n="hint-furniture"></p>
      <div id="furniture"></div>
    </div>

    <div class="group">
      <h2 data-i18n="sec-person"></h2>
      <p class="hint" data-i18n="hint-person"></p>
      <div id="person"></div>
    </div>

    <div class="group">
      <h2 data-i18n="sec-shadow"></h2>
      <div class="row"><label data-i18n="lbl-showshadow"></label><input id="showShadow" type="checkbox" checked style="accent-color:var(--sun)"></div>
      <div class="readout" id="shadowReadout"></div>
    </div>
    <div class="group">
      <h2 data-i18n="sec-dayshade"></h2>
      <p class="hint" data-i18n="hint-dayshade"></p>
      <div class="readout" id="dayShade"></div>
    </div>
    <div class="group"><h2 data-i18n="sec-sun"></h2><div class="readout" id="sunReadout"></div></div>
    <div class="group"><h2 data-i18n="sec-legend"></h2>
      <div class="legend" id="legendText"></div>
    </div>
  </aside>
  <main id="stage"><div id="hud"></div><div id="dayHud"></div></main>
</div>

<script src="https://unpkg.com/suncalc@1.9.0/suncalc.js"></script>

function migrate(st){
  if(!st) return null;
  const d=defaultState();
  const hadWalls = st.garden && st.garden.walls && typeof st.garden.walls==='object';
  const legacyWallH = (st.garden && typeof st.garden.wallH==='number') ? st.garden.wallH : null;
  st.garden=Object.assign({},d.garden,st.garden||{});
  if(!hadWalls){
    const wh=(legacyWallH!=null)?legacyWallH:3;
    st.garden.walls={ x0:wh, xb:wh, y0:wh, yt:wh };
  } else {
    st.garden.walls=Object.assign({},d.garden.walls,st.garden.walls);
  }
  delete st.garden.wallH;
  st.loc=Object.assign({},d.loc,st.loc||{});
  st.ref={ corner:2, ox:0, oy:0, oz:0 };
  if(!st.dateStr) st.dateStr=d.dateStr;
  if(typeof st.timeMin!=='number') st.timeMin=d.timeMin;
  if(typeof st.showLabels!=='boolean') st.showLabels=false;
  if(!Array.isArray(st.points)||st.points.length<6) st.points=d.points;
  st.points=st.points.map((p,i)=>({ x:num(p&&p.x, d.points[i].x), y:num(p&&p.y, d.points[i].y), h:num(p&&p.h, d.points[i].h) }));
  if(!Array.isArray(st.sails)) st.sails=d.sails;
  st.sails=st.sails.map((s,i)=>Object.assign({}, d.sails[i]||d.sails[0], s||{}));
  st.furniture=Object.assign({},d.furniture,st.furniture||{});
  ['table','chair1','chair2','pergola'].forEach(k=>{ st.furniture[k]=Object.assign({},d.furniture[k],st.furniture[k]||{}); });
  if(!st._pivotCorner){
    const tab=st.furniture.table, pg=st.furniture.pergola;
    if(tab){ tab.x-=(tab.tw||1.1)/2; tab.y-=(tab.tl||0.7)/2; }
    if(pg){ pg.x-=(pg.pw||3)/2; pg.y-=(pg.pl||3)/2; }
    st._pivotCorner=true;

  if(!st.person) st.person=d.person; else st.person=Object.assign({},d.person,st.person);
  if(typeof st.person.h!=='number'||st.person.h<0.5) st.person.h=1.9;
  return st;
}

function roundRect(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function makeTextSprite(lines,hex){
  const fs=20,lh=24,pad=10; const canvas=document.createElement('canvas'); const ctx=canvas.getContext('2d');
  const font=`600 ${fs}px -apple-system,Segoe UI,Roboto,sans-serif`; ctx.font=font;
  const w=Math.ceil(Math.max(...lines.map(l=>ctx.measureText(l).width)))+pad*2;
  const h=lines.length*lh+pad*2; canvas.width=w; canvas.height=h;
  ctx.font=font; ctx.textBaseline='top';
  ctx.fillStyle='rgba(17,22,28,0.85)'; roundRect(ctx,0,0,w,h,9); ctx.fill();
  ctx.strokeStyle=hex; ctx.lineWidth=2; roundRect(ctx,1,1,w-2,h-2,8); ctx.stroke();
  lines.forEach((l,i)=>{ ctx.fillStyle=i===0?hex:'#d3dde7'; ctx.fillText(l,pad,pad+i*lh); });
  const tex=new THREE.CanvasTexture(canvas); tex.anisotropy=4;

  const sc=0.004; spr.scale.set(w*sc,h*sc,1); spr.renderOrder=999; return spr;
}

/* ---- Tagesauswertung ---- */
const ROUND=n=>Math.round(n*100)/100;
/* Sutherland-Hodgman polygon clipping to garden rectangle (XZ plane) */
function clipPolyToGarden(pts){
  const hw=S.garden.w/2, hd=S.garden.d/2;
  const edges=[ // each edge: inside test + intersection
    {inside:p=>p.x>=-hw, intersect:(a,b)=>{const t=(-hw-a.x)/(b.x-a.x); return {x:-hw,z:a.z+t*(b.z-a.z)};}},
    {inside:p=>p.x<= hw, intersect:(a,b)=>{const t=( hw-a.x)/(b.x-a.x); return {x: hw,z:a.z+t*(b.z-a.z)};}},
    {inside:p=>p.z>=-hd, intersect:(a,b)=>{const t=(-hd-a.z)/(b.z-a.z); return {x:a.x+t*(b.x-a.x),z:-hd};}},
    {inside:p=>p.z<= hd, intersect:(a,b)=>{const t=( hd-a.z)/(b.z-a.z); return {x:a.x+t*(b.x-a.x),z: hd};}}
  ];
  let poly=pts.map(p=>({x:p.x,z:p.z}));
  for(const e of edges){
    if(poly.length===0) return [];
    const out=[];
    for(let i=0;i<poly.length;i++){
      const cur=poly[i], prev=poly[(i+poly.length-1)%poly.length];
      const ci=e.inside(cur), pi=e.inside(prev);
      if(pi&&ci) out.push(cur);
      else if(pi&&!ci) out.push(e.intersect(prev,cur));
      else if(!pi&&ci){ out.push(e.intersect(prev,cur)); out.push(cur); }
    }
    poly=out;
  }
  return poly;
}
function polyAreaXZ(pts){
  let a=0; for(let i=0;i<pts.length;i++){const p=pts[i],q=pts[(i+1)%pts.length]; a+=p.x*q.z-q.x*p.z;} return Math.abs(a)/2;
}
function sunDirAtMin(min){
  const {lat,lon}=S.loc; const date=new Date(S.dateStr+'T00:00:00'); date.setMinutes(min);
  const pos=SunCalc.getPosition(date,lat,lon); const az=pos.azimuth,alt=pos.altitude; const nr=S.garden.north*DEG;
  const dir=new THREE.Vector3(-Math.sin(az)*Math.cos(alt),Math.sin(alt),-Math.cos(az)*Math.cos(alt)).applyAxisAngle(new THREE.Vector3(0,1,0),nr);
  return { dir, alt };
}
function sailGroundArea(s,dir){
  if(dir.y<=0.02) return 0;
  const corners=sailCorners(s); const proj=corners.map(P=>P.clone().addScaledVector(dir,-(P.y/dir.y)));
  const clipped=clipPolyToGarden(proj);
  return polyAreaXZ(clipped);
}
function computeDayShade(){
  const start=600,end=1080,step=15, hours=(end-start)/60;
  const sums=S.sails.map(()=>0);
  for(let m=start;m<=end;m+=step){ const {dir,alt}=sunDirAtMin(m); const wgt=(m===start||m===end)?0.5:1; const dayOk=alt>0&&dir.y>0.02;
    S.sails.forEach((s,si)=>{ if(s.on && dayOk) sums[si]+=sailGroundArea(s,dir)*wgt; }); }
  const res={ window:'10:00–18:00', date:S.dateStr, stepMin:step, perSail:[], total_m2h:0, total_avg_m2:0 };
  S.sails.forEach((s,si)=>{ if(!s.on) return; const integral=sums[si]*step/60, avg=integral/hours;
    res.perSail.push({ sail:si+1, integral_m2h:ROUND(integral), avg_m2:ROUND(avg) });
    res.total_m2h+=integral; res.total_avg_m2+=avg; });
  res.total_m2h=ROUND(res.total_m2h); res.total_avg_m2=ROUND(res.total_avg_m2);
  return res;
}
function renderDayShade(){
  const r=computeDayShade(); S.shadeAnalysis=r;
  const out=document.getElementById('dayShade'); if(!out) return;
  if(!r.perSail.length){ out.innerHTML=t('dayshade-none'); renderDayHud(r); return; }
  let html=`<span style="color:var(--muted)">${r.date} · 10–18h</span><br>`;
  r.perSail.forEach(p=>{ html+=`${t('shadow-sail')} ${p.sail}: <b>${fmt(p.integral_m2h)} m²·h</b> <span style="color:var(--muted)">(Ø ${fmt(p.avg_m2)} m²)</span><br>`; });
  if(r.perSail.length>1) html+=`${t('dayshade-total')}: <b>${fmt(r.total_m2h)} m²·h</b> <span style="color:var(--muted)">(Ø ${fmt(r.total_avg_m2)} m²)</span>`;
  out.innerHTML=html;
  renderDayHud(r);
}
function renderDayHud(r){
  const hud=document.getElementById('dayHud'); if(!hud) return;
  if(!r.perSail.length){ hud.innerHTML=''; return; }
  let h=`<div class="dh-label">${t('sec-dayshade')} · ${r.date}</div>`;

  $('lon').value=fmt(S.loc.lon,4); $('lon').oninput=e=>{S.loc.lon=pn(e.target.value);$('city').value='manual';updateSun();renderDayShade();touch();};
  syncCity();
  $('date').value=S.dateStr; $('date').onchange=e=>{S.dateStr=e.target.value;updateSun();renderDayShade();touch();};
  $('time').value=S.timeMin; $('time').dataset.default=DEF.timeMin; setTimeInputs();
  $('time').oninput=e=>{S.timeMin=+e.target.value; setTimeInputs(); updateSun(); touch();};
  $('timeInput').onchange=e=>{ const [h,m]=e.target.value.split(':').map(Number); if(!isNaN(h)){ S.timeMin=h*60+(m||0); $('time').value=S.timeMin; updateSun(); touch(); } };
  const sl=$('showLabels'); sl.checked=S.showLabels; sl.onchange=()=>{ S.showLabels=sl.checked; buildLabels(); touch(); };
  const ss=$('showShadow'); if(ss) ss.onchange=()=>updateSun();
}
function setTimeInputs(){ const hh=String(Math.floor(S.timeMin/60)).padStart(2,'0'),mm=String(S.timeMin%60).padStart(2,'0'); $('timeInput').value=`${hh}:${mm}`; }

let playing=false;
$('play').onclick=()=>{ playing=!playing; $('play').textContent=playing?t('btn-pause'):t('btn-play'); if(playing) loopPlay(); };
function loopPlay(){ if(!playing) return; S.timeMin=(S.timeMin+4)%1440; $('time').value=S.timeMin; setTimeInputs(); updateSun(); setTimeout(()=>requestAnimationFrame(loopPlay),40); }
$('now').onclick=()=>{ const n=new Date(); S.dateStr=n.toISOString().slice(0,10); S.timeMin=n.getHours()*60+n.getMinutes(); $('date').value=S.dateStr; $('time').value=S.timeMin; setTimeInputs(); updateSun(); touch(); };

function buildPointEditors(){
  const host=$('points'); host.innerHTML='';
  S.points.forEach((p,i)=>{
    const D=DEF.points[i]; const card=document.createElement('div'); card.className='card'; card.dataset.postIdx=i; card.dataset.postIdx=i;
    card.innerHTML=`<h3><span><span class="dot" style="background:${POST_HEX[i]}"></span>${t('post-label')} ${i+1}</span></h3>
      ${rowHTML(t('lbl-x'),'rx',-15,15,0.1,p.x,'m',D.x)}${rowHTML(t('lbl-y'),'ry',-15,15,0.1,p.y,'m',D.y)}${rowHTML(t('lbl-height'),'rh',0.3,6,0.1,p.h,'m',D.h)}`;
    link(card,'rx',-15,15,v=>{p.x=v;updateAll();}); link(card,'ry',-15,15,v=>{p.y=v;updateAll();}); link(card,'rh',0.3,6,v=>{p.h=v;updateAll();});
    host.appendChild(card);
  });
}

function postOptions(selected){ return S.points.map((p,i)=>`<option value="${i}" style="color:${POST_HEX[i]}" ${i===selected?'selected':''}>● ${t('post-label')} ${i+1}</option>`).join(''); }
function nextFreePost(s){ for(let i=0;i<S.points.length;i++) if(!s.posts.includes(i)) return i; return 0; }
function rotateSail(s,dir){ if(dir>0) s.posts.unshift(s.posts.pop()); else s.posts.push(s.posts.shift()); }
function buildSailEditors(){
  const host=$('sails'); host.innerHTML='';
  S.sails.forEach((s,si)=>{
    const card=document.createElement('div'); card.className='card'; card.dataset.sailIdx=si;
    const sizeHtml = s.shape===3
      ? numRowHTML(t('lbl-side-a'),'sa',s.a,'m')+numRowHTML(t('lbl-side-b'),'sb',s.b,'m')+numRowHTML(t('lbl-side-c'),'sc',s.c,'m')
      : numRowHTML(t('lbl-bw'),'bw',s.bw,'m')+numRowHTML(t('lbl-bl'),'bl',s.bl,'m');
    let cornersHtml=''; for(let k=0;k<s.shape;k++) cornersHtml+=`<div class="row"><label>${t('lbl-corner-n')} ${k+1}</label><select class="ps" data-k="${k}">${postOptions(s.posts[k])}</select><span class="val rl" data-si="${si}" data-k="${k}">– m</span></div>`;
    card.innerHTML=`<h3>${t('sail-label')} ${si+1}<label style="font-weight:400;font-size:11px;color:var(--muted)"><input type="checkbox" class="on" ${s.on?'checked':''}> ${t('lbl-active')}</label></h3>
      <div class="seg"><button data-n="3" class="${s.shape===3?'active':''}">${t('lbl-3corners')}</button><button data-n="4" class="${s.shape===4?'active':''}">${t('lbl-4corners')}</button></div>
      ${sizeHtml}${cornersHtml}
      <div class="row"><label>${t('lbl-rotate')}</label><button class="minib rotL" title="${t('rot-ccw')}">⟲</button><button class="minib rotR" title="${t('rot-cw')}">⟳</button><button class="minib ctr" title="${t('center-tip')}">${t('lbl-center')}</button></div>
      <div class="row"><label>${t('lbl-color')}</label><input class="scol" type="color" value="${s.color}"></div>
      ${rowHTML(t('lbl-opacity'),'so',0.3,1,0.05,s.opacity,'',1)}
      <p class="hint" style="margin:6px 0 0">${t('hint-sail-note')}</p>`;
    const q=sel=>card.querySelector(sel);
    q('.on').onchange=e=>{ s.on=e.target.checked; updateAll(); touch(); };
    card.querySelectorAll('.seg button').forEach(b=>b.onclick=()=>{ const n=+b.dataset.n; if(n===s.shape) return;
      s.shape=n; s.posts=s.posts.slice(0,n); while(s.posts.length<n) s.posts.push(nextFreePost(s)); buildSailEditors(); updateAll(); touch(); });
    if(s.shape===3){ bindNum(card,'sa',0.5,20,v=>s.a=v); bindNum(card,'sb',0.5,20,v=>s.b=v); bindNum(card,'sc',0.5,20,v=>s.c=v); }
    else { bindNum(card,'bw',0.5,20,v=>s.bw=v); bindNum(card,'bl',0.5,20,v=>s.bl=v); }
    card.querySelectorAll('.ps').forEach(sel=>sel.onchange=e=>{ s.posts[+sel.dataset.k]=+e.target.value; updateAll(); touch(); });
    q('.rotL').onclick=()=>{ rotateSail(s,-1); buildSailEditors(); updateAll(); touch(); };
    q('.rotR').onclick=()=>{ rotateSail(s, 1); buildSailEditors(); updateAll(); touch(); };
    q('.ctr').onclick=()=>{ s.dx=0; s.dz=0; updateAll(); touch(); };
    q('.scol').oninput=e=>{ s.color=e.target.value; buildSails(); touch(); };
    link(card,'so',0.3,1,v=>{s.opacity=v;buildSails();});
    host.appendChild(card);
  });
}

function buildFurnitureEditors(){
  const host=$('furniture'); host.innerHTML='';
  const labels={table:t('furn-table'),chair1:t('furn-chair1'),chair2:t('furn-chair2'),pergola:t('furn-pergola')};
  ['table','chair1','chair2','pergola'].forEach(key=>{
    const f=S.furniture[key]; if(!f) return; const D=DEF.furniture[key]; const card=document.createElement('div'); card.className='card'; card.dataset.fkey=key;
    let sizeHtml='';
    if(key==='table') sizeHtml=rowHTML(t('lbl-bw'),'tw',0.5,3,0.05,f.tw,'m',D.tw)+rowHTML(t('lbl-bl'),'tl',0.5,3,0.05,f.tl,'m',D.tl)+rowHTML(t('lbl-height'),'th',0.4,1.1,0.01,f.th,'m',D.th);
    if(key==='pergola') sizeHtml=rowHTML(t('lbl-bw'),'pw',1,6,0.1,f.pw,'m',D.pw)+rowHTML(t('lbl-bl'),'pl',1,6,0.1,f.pl,'m',D.pl)+rowHTML(t('lbl-height'),'ph',1.8,3,0.05,f.ph,'m',D.ph);
    card.innerHTML=`<h3>${labels[key]}<label style="font-weight:400;font-size:11px;color:var(--muted)"><input type="checkbox" class="on" ${f.on?'checked':''}> ${t('lbl-visible')}</label></h3>
      ${rowHTML(t('lbl-x'),'fx',-15,15,0.1,f.x,'m',D.x)}${rowHTML(t('lbl-y'),'fy',-15,15,0.1,f.y,'m',D.y)}${rowHTML(t('lbl-yaw'),'fyaw',-180,180,1,f.yaw,'°',D.yaw)}${sizeHtml}`;
    const q=s=>card.querySelector(s);
    q('.on').onchange=e=>{f.on=e.target.checked; buildFurniture(); updateSun(); touch();};
    link(card,'fx',-15,15,v=>{f.x=v;buildFurniture();updateSun();}); link(card,'fy',-15,15,v=>{f.y=v;buildFurniture();updateSun();}); link(card,'fyaw',-180,180,v=>{f.yaw=v;buildFurniture();});
    if(key==='table'){ link(card,'tw',0.5,3,v=>{f.tw=v;buildFurniture();updateSun();}); link(card,'tl',0.5,3,v=>{f.tl=v;buildFurniture();updateSun();}); link(card,'th',0.4,1.1,v=>{f.th=v;buildFurniture();updateSun();}); }
    if(key==='pergola'){ link(card,'pw',1,6,v=>{f.pw=v;buildFurniture();updateSun();}); link(card,'pl',1,6,v=>{f.pl=v;buildFurniture();updateSun();}); link(card,'ph',1.8,3,v=>{f.ph=v;buildFurniture();updateSun();}); }
    host.appendChild(card);
  });
}
function syncFurnitureInputs(key){ const card=document.querySelector(`#furniture .card[data-fkey="${key}"]`); if(!card) return; const f=S.furniture[key];
  const fx=card.querySelector('.fx'),fxn=card.querySelector('.fxn'),fy=card.querySelector('.fy'),fyn=card.querySelector('.fyn');
  if(fx){ fx.value=f.x.toFixed(1); fxn.value=fmt(f.x); } if(fy){ fy.value=f.y.toFixed(1); fyn.value=fmt(f.y); } }

function buildPersonEditor(){
  const host=$('person'); host.innerHTML='';
  const p=S.person; const D=DEF.person||{on:true,x:-2,y:-2,h:1.9};
  const card=document.createElement('div'); card.className='card';
  card.innerHTML=`<h3>${t('person-label')}<label style="font-weight:400;font-size:11px;color:var(--muted)"><input type="checkbox" class="on" ${p.on?'checked':''}> ${t('lbl-visible')}</label></h3>
    ${rowHTML(t('lbl-x'),'px',-15,15,0.1,p.x,'m',D.x)}${rowHTML(t('lbl-y'),'py',-15,15,0.1,p.y,'m',D.y)}${rowHTML(t('lbl-person-h'),'ph',0.5,2.5,0.01,p.h,'m',D.h)}`;
  card.querySelector('.on').onchange=e=>{ p.on=e.target.checked; buildPerson(); touch(); };
  link(card,'px',-15,15,v=>{p.x=v;buildPerson();}); link(card,'py',-15,15,v=>{p.y=v;buildPerson();}); link(card,'ph',0.5,2.5,v=>{p.h=v;buildPerson();});
  host.appendChild(card);
}
function syncPersonInputs(){ const card=document.querySelector('#person .card'); if(!card) return; const p=S.person;
  const px=card.querySelector('.px'),pxn=card.querySelector('.pxn'),py=card.querySelector('.py'),pyn=card.querySelector('.pyn');
  if(px){ px.value=p.x.toFixed(1); pxn.value=fmt(p.x); } if(py){ py.value=p.y.toFixed(1); pyn.value=fmt(p.y); } }

$('btnExport').onclick=()=>{ S.shadeAnalysis=computeDayShade();
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  const n=new Date(),p=x=>String(x).padStart(2,'0');
  a.download=`shade-sail-setup_${n.getFullYear()}-${p(n.getMonth()+1)}-${p(n.getDate())}_${p(n.getHours())}${p(n.getMinutes())}.json`;
  a.click(); URL.revokeObjectURL(a.href); };
$('btnImport').onclick=()=>$('fileImport').click();
$('fileImport').onchange=e=>{ const file=e.target.files[0]; if(!file) return; const r=new FileReader();
  r.onload=()=>{ try{ const obj=JSON.parse(r.result); S=migrate(obj)||defaultState(); refreshUI(); saveState(); $('saveState').textContent=t('import-ok'); }catch(err){ $('saveState').textContent=t('import-err')+err.message; } };
  r.readAsText(file); e.target.value=''; };
$('btnReset').onclick=()=>{ if(confirm(t('reset-confirm'))){ S=defaultState(); refreshUI(); saveState(); } };

function refreshUI(){ applyTranslations(); wireStaticUI(); buildPointEditors(); buildSailEditors(); buildFurnitureEditors(); buildPersonEditor(); buildGarden(); updateAll(); }

function onResize(){ const w=stage.clientWidth,h=stage.clientHeight; renderer.setSize(w,h); renderer.setPixelRatio(Math.min(devicePixelRatio,2)); camera.aspect=w/h; camera.updateProjectionMatrix(); }
window.addEventListener('resize',onResize);
function animate(){ requestAnimationFrame(animate); controls.update(); renderer.render(scene,camera); }

/* ---- Maus-Drag & Click-to-Scroll ---- */
let drag=null; let pointerDownPos=null;
function ndc(e){ const r=renderer.domElement.getBoundingClientRect(); return new THREE.Vector2(((e.clientX-r.left)/r.width)*2-1,-((e.clientY-r.top)/r.height)*2+1); }
function groundPoint(e,y=0){ raycaster.setFromCamera(ndc(e),camera); const plane=new THREE.Plane(new THREE.Vector3(0,1,0),-y); const pt=new THREE.Vector3(); return raycaster.ray.intersectPlane(plane,pt)?pt:null; }
function scrollToCard(selector){ const el=document.querySelector(selector); if(!el) return; el.scrollIntoView({behavior:'smooth',block:'center'}); el.classList.remove('highlight'); void el.offsetWidth; el.classList.add('highlight'); }
function handleClick(e){ raycaster.setFromCamera(ndc(e),camera);
  /* poles */
  const poles=raycaster.intersectObjects(polesGroup.children,false);
  if(poles.length){ const idx=Math.floor(polesGroup.children.indexOf(poles[0].object)/2); if(idx>=0) scrollToCard(`#points .card[data-post-idx="${idx}"]`); return; }
  /* sails */
  const sm=sailMeshes.filter(m=>m.visible); const sh=raycaster.intersectObjects(sm,false);
  if(sh.length){ const si=sailMeshes.indexOf(sh[0].object); scrollToCard(`#sails .card[data-sail-idx="${si}"]`); return; }
  /* person */
  const ph=raycaster.intersectObjects(personGroup.children,false);
  if(ph.length){ scrollToCard('#person .card'); return; }
  /* furniture */
  const fh=raycaster.intersectObjects(furnGroup.children,true);
  if(fh.length){ let o=fh[0].object; while(o && o.userData.furnKey===undefined) o=o.parent; if(o){ scrollToCard(`#furniture .card[data-fkey="${o.userData.furnKey}"]`); return; } }
  /* walls */
  if(wallsGroup){ const wh=raycaster.intersectObjects(wallsGroup.children,false); if(wh.length){ scrollToCard('#group-garden'); return; } }
}
function onPointerDown(e){ if(e.button!==0) return; pointerDownPos={x:e.clientX,y:e.clientY}; raycaster.setFromCamera(ndc(e),camera);
  const sm=sailMeshes.filter(m=>m.visible); const sh=raycaster.intersectObjects(sm,false);
  if(sh.length){ drag={ type:'sail', si:sailMeshes.indexOf(sh[0].object), y:sh[0].point.y, last:sh[0].point.clone() }; controls.enabled=false; return; }
  /* person drag */
  const ph=raycaster.intersectObjects(personGroup.children,false);
  if(ph.length){ const pt=groundPoint(e,0); if(pt){ drag={ type:'person', last:pt }; controls.enabled=false; return; } }
  const fh=raycaster.intersectObjects(furnGroup.children,true);
  if(fh.length){ let o=fh[0].object; while(o && o.userData.furnKey===undefined) o=o.parent; const pt=groundPoint(e,0);
    if(o && pt){ drag={ type:'furn', key:o.userData.furnKey, last:pt }; controls.enabled=false; return; } }
}
function onPointerMove(e){ if(!drag) return;
  if(drag.type==='sail'){ const pt=groundPoint(e,drag.y); if(pt){ const s=S.sails[drag.si];
      s.dx=(s.dx||0)+(pt.x-drag.last.x); s.dz=(s.dz||0)+(pt.z-drag.last.z); drag.last.copy(pt);
      const surf=sailSurface(s); s.dx=surf.center.x-surf.G.x; s.dz=surf.center.z-surf.G.z;
      buildSails(); buildRopes(); updateRopeReadouts(); updateShadow(sunDir.y>0.02); touch(); } }
  else if(drag.type==='person'){ const pt=groundPoint(e,0); if(pt){ const p=S.person; p.x+=(pt.x-drag.last.x); p.y+=(pt.z-drag.last.z); drag.last.copy(pt);
      buildPerson(); syncPersonInputs(); touch(); } }
  else { const pt=groundPoint(e,0); if(pt){ const f=S.furniture[drag.key]; f.x+=(pt.x-drag.last.x); f.y+=(pt.z-drag.last.z); drag.last.copy(pt);
      buildFurniture(); updateShadow(sunDir.y>0.02); syncFurnitureInputs(drag.key); touch(); } }
}
function onPointerUp(e){ const wasDrag=!!drag; drag=null; controls.enabled=true;
  if(wasDrag) renderDayShade();
  else if(pointerDownPos && e && Math.abs(e.clientX-pointerDownPos.x)+Math.abs(e.clientY-pointerDownPos.y)<6) handleClick(e);
  pointerDownPos=null;
}
renderer.domElement.addEventListener('pointerdown',onPointerDown,true);
window.addEventListener('pointermove',onPointerMove); window.addEventListener('pointerup',onPointerUp);

$('panel').addEventListener('dblclick',e=>{ const el=e.target; if(el.tagName==='INPUT'&&el.type==='range'&&el.dataset.default!==undefined){ el.value=el.dataset.default; el.dispatchEvent(new Event('input',{bubbles:true})); } });

applyTranslations();
refreshUI(); onResize(); animate();
</script>
